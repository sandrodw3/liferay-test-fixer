<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>Fix run ({{date}})</title>
		<style>
			:root {
				--c-bug: #c0392b;
				--c-outdated: #d68910;
				--c-no-fix: #1e8449;
				--c-unresolved: #5d6d7e;
				--c-bg: #fdfdfd;
				--c-fg: #1c1c1c;
				--c-muted: #5a6772;
				--c-border: #e1e4e8;
				--c-row: #f6f8fa;
				--c-code-bg: #eef1f4;
				--c-link: #1f4dbf;
			}
			* {
				box-sizing: border-box;
			}
			html,
			body {
				margin: 0;
				padding: 0;
				background: var(--c-bg);
				color: var(--c-fg);
				font-family:
					-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
					'Helvetica Neue', Arial, sans-serif;
				line-height: 1.55;
				-webkit-font-smoothing: antialiased;
			}
			main {
				padding: 32px 28px 80px;
			}
			h1 {
				margin: 0 0 4px;
				font-size: 26px;
			}
			.summary {
				color: var(--c-muted);
				font-size: 14px;
				margin-bottom: 28px;
				padding-bottom: 14px;
				border-bottom: 1px solid var(--c-border);
			}
			.table-wrapper {
				border: 1px solid var(--c-border);
				border-radius: 8px;
				overflow: hidden;
			}
			table {
				width: 100%;
				border-collapse: collapse;
				font-size: 13px;
				table-layout: fixed;
			}
			tbody tr:last-child td {
				border-bottom: 0;
			}
			thead th {
				position: sticky;
				top: 0;
				background: #f0f3f6;
				text-align: left;
				padding: 10px 10px;
				border-bottom: 2px solid var(--c-border);
				font-weight: 600;
			}
			thead th:nth-child(1) {
				width: 18%;
			}
			thead th:nth-child(2) {
				width: 9%;
			}
			thead th:nth-child(3) {
				width: 11%;
			}
			thead th:nth-child(4) {
				width: auto;
			}
			thead th:nth-child(5) {
				width: 10%;
			}
			thead th:nth-child(6) {
				width: 11%;
			}
			thead th:nth-child(7) {
				width: 8%;
			}
			tbody td {
				padding: 10px;
				border-bottom: 1px solid var(--c-border);
				vertical-align: top;
				overflow-wrap: anywhere;
				word-break: break-word;
			}
			tbody tr:nth-child(even) td {
				background: var(--c-row);
			}
			td.col-type {
				white-space: normal;
			}
			td code,
			td a code {
				overflow-wrap: anywhere;
				word-break: break-word;
				white-space: normal;
			}
			.test-name {
				display: inline-block;
				padding: 6px 10px;
				background: var(--c-code-bg);
				border: 1px solid var(--c-border);
				border-radius: 6px;
				color: var(--c-bug);
				font-family:
					ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
				font-size: 0.9em;
				line-height: 1.4;
				overflow-wrap: anywhere;
				word-break: break-word;
				white-space: normal;
			}
			a {
				color: var(--c-link);
				text-decoration: none;
			}
			a:hover {
				text-decoration: underline;
			}
			.verdict {
				display: inline-block;
				padding: 2px 8px;
				border-radius: 10px;
				font-size: 12px;
				font-weight: 600;
				color: white;
				white-space: nowrap;
			}
			.verdict.bug-in-portal {
				background: var(--c-bug);
			}
			.verdict.outdated-test {
				background: var(--c-outdated);
			}
			.verdict.no-fix-needed {
				background: var(--c-no-fix);
			}
			.verdict.unresolved {
				background: var(--c-unresolved);
			}
			code {
				background: var(--c-code-bg);
				padding: 1px 5px;
				border-radius: 3px;
				font-family:
					ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
				font-size: 0.92em;
			}
			.muted {
				color: var(--c-muted);
			}
			.nowrap {
				white-space: nowrap;
			}
		</style>
	</head>
	<body>
		<main>
			<h1>Fix run ({{date}})</h1>
			<p class="summary">
				Failures processed: {{total}} ({{resolved}} resolved,
				{{noFixNeeded}} no fix needed, {{unresolved}} unresolved) ·
				Elapsed: {{minutes}}m {{seconds}}s
			</p>

			<div class="table-wrapper">
				<table>
					<thead>
						<tr>
							<th>Test name</th>
							<th>Type</th>
							<th>Verdict</th>
							<th>Conclusion</th>
							<th>Resolution time</th>
							<th>Jira ticket</th>
							<th>PR</th>
						</tr>
					</thead>
					<tbody>
						{{rows}}
					</tbody>
				</table>
			</div>
		</main>
	</body>
</html>
